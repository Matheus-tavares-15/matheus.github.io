        // 3. LÓGICA DE CORES
        function getColorByStatus(description) {
            if (!description) return '#6c757d'; // Cinza (Sem informação)

            let desc = description.toUpperCase();

            // Regras Específicas solicitadas por você
            if (desc.includes("APROVADA E EXISTENTE")) return '#28a745'; // Verde
            if (desc.includes("REPROVADA E EXISTENTE")) return '#dc3545'; // Vermelho
            if (desc.includes("APROVADA E NÃO EXISTENTE") || desc.includes("APROVADA E NAO EXISTENTE")) return '#007bff'; // Azul
            if (desc.includes("REPROVADA C/ DESENHO")) return '#e83e8c'; // Magenta

            // Fallback (Porque nos arquivos enviados, está escrito apenas "APROVADO" ou "REPROVADO")
            if (desc.includes("APROV")) return '#28a745'; // Verde para qualquer Aprovado
            if (desc.includes("REPROV")) return '#dc3545'; // Vermelho para qualquer Reprovado

            return '#6c757d'; // Cinza para qualquer outra coisa
        }


        // 4. ESTILIZANDO E ADICIONANDO POPUPS
        function styleFeature(feature) {
            return {
                color: getColorByStatus(feature.properties.description),
                weight: 4,
                opacity: 0.8
            };
        }

        function onEachFeature(feature, layer) {
            let nome = feature.properties.Name || "Sem Nome";
            let descricao = feature.properties.description || "Sem descrição disponível";
            
            // Troca as quebras de linha invisíveis por <br> no HTML para ficar bonito no popup
            descricao = descricao.replace(/\n/g, '<br>');

            let popupContent = `
                <div style="font-family: Arial; font-size: 12px;">
                    <h3 style="margin-top:0;">${nome}</h3>
                    <p>${descricao}</p>
                </div>
            `;
            layer.bindPopup(popupContent);
        }

        // 5. CARREGANDO OS DADOS NO MAPA
        // Cria um grupo para todas as camadas (isso ajuda a dar o zoom automático no final)
        const camadaGeral = L.featureGroup();

        // Array com os 3 arquivos
        const todosOsDados = [taboaoDaSerra, carapicuiba, embuDasArtes];

        // Processa cada arquivo
        todosOsDados.forEach(geojsonDados => {
            const layer = L.geoJSON(geojsonDados, {
                style: styleFeature,
                onEachFeature: onEachFeature
            });
            camadaGeral.addLayer(layer);
        });

        // Adiciona tudo no mapa
        camadaGeral.addTo(map);

        // Zoom automático para mostrar todas as linhas
        map.fitBounds(camadaGeral.getBounds());


        // 6. ADICIONANDO A LEGENDA NO CANTO DA TELA
        const legend = L.control({position: 'bottomright'});

        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<h4>Status</h4>';
            div.innerHTML += '<i style="background: #28a745"></i> Aprovada e existente (ou Aprovada)<br>';
            div.innerHTML += '<i style="background: #dc3545"></i> Reprovada e existente (ou Reprovada)<br>';
            div.innerHTML += '<i style="background: #007bff"></i> Aprovada e não existente<br>';
            div.innerHTML += '<i style="background: #e83e8c"></i> Reprovada c/ desenho<br>';
            div.innerHTML += '<i style="background: #6c757d"></i> Sem Informação<br>';
            return div;
        };

        legend.addTo(map);
