<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Linhas - Situação</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #f4f7f6;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        #filters-header {
            background: #00061d;
            padding: 14px 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,.25);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .filter-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-title {
            font-weight: 700;
            color: #fff;
            min-width: 78px;
            font-size: 14px;
        }

        .filter-label {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            font-size: 13px;
            color: #fff;
            background: transparent;
            padding: 6px 10px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,.75);
            transition: .2s ease;
        }

        .filter-label:hover {
            background: rgba(255,255,255,.12);
            border-color: #fff;
        }

        .filter-label input {
            margin-right: 7px;
        }

        .color-box {
            width: 13px;
            height: 13px;
            border-radius: 3px;
            margin-right: 6px;
            display: inline-block;
        }

        .empty-note {
            color: rgba(255,255,255,.72);
            font-size: 13px;
        }

        #map {
            flex: 1;
            min-height: 0;
            width: 100%;
            z-index: 1;
        }

        #status-bar {
            position: absolute;
            left: 14px;
            bottom: 14px;
            z-index: 1500;
            background: rgba(255,255,255,.94);
            border-radius: 8px;
            padding: 8px 11px;
            box-shadow: 0 2px 8px rgba(0,0,0,.18);
            font-size: 12px;
            color: #333;
        }

        .situation-popup {
            min-width: 190px;
            font-size: 14px;
            line-height: 1.5;
        }

        .situation-popup strong {
            color: #00061d;
        }
    </style>
</head>

<body>
    <div id="filters-header">
        <div class="title">Mapa de Linhas por Situação</div>

        <div class="filter-row">
            <div class="filter-title">Cidades:</div>
            <div id="city-filters" class="filter-row">
                <span class="empty-note">Nenhuma cidade carregada.</span>
            </div>
        </div>

        <div class="filter-row">
            <div class="filter-title">Situação:</div>

            <label class="filter-label">
                <input type="checkbox" class="status-filter" value="Aprovada e existente" checked>
                <span class="color-box" style="background:#28a745"></span>
                Aprovada e existente
            </label>

            <label class="filter-label">
                <input type="checkbox" class="status-filter" value="Reprovada e existente" checked>
                <span class="color-box" style="background:#dc3545"></span>
                Reprovada e existente
            </label>

            <label class="filter-label">
                <input type="checkbox" class="status-filter" value="Aprovada e não existente" checked>
                <span class="color-box" style="background:#007bff"></span>
                Aprovada e não existente
            </label>

            <label class="filter-label">
                <input type="checkbox" class="status-filter" value="Reprovada c/ desenho" checked>
                <span class="color-box" style="background:#ff00ff"></span>
                Reprovada c/ desenho
            </label>
        </div>
    </div>

    <div id="map"></div>
    <div id="status-bar">0 linha(s) exibida(s)</div>

        const STATUS_COLORS = {
            "Aprovada e existente": "#28a745",
            "Reprovada e existente": "#dc3545",
            "Aprovada e não existente": "#007bff",
            "Reprovada c/ desenho": "#ff00ff"
        };

        const map = L.map("map").setView([-23.5505, -46.6333], 10);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "&copy; OpenStreetMap contributors",
            maxZoom: 20
        }).addTo(map);

        const camadaGeral = L.featureGroup().addTo(map);
        const cityFiltersEl = document.getElementById("city-filters");
        const statusBar = document.getElementById("status-bar");

        let datasets = [];
        let normalizedFeatures = [];

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function extractLineGeometries(geometry) {
            if (!geometry || !geometry.type) return [];

            if (geometry.type === "LineString") {
                return [{
                    type: "LineString",
                    coordinates: geometry.coordinates
                }];
            }

            if (geometry.type === "MultiLineString") {
                return [{
                    type: "MultiLineString",
                    coordinates: geometry.coordinates
                }];
            }

            if (geometry.type === "GeometryCollection") {
                return (geometry.geometries || []).flatMap(extractLineGeometries);
            }

            return [];
        }

        function normalizeDataset(dataset) {
            const data = dataset?.data || dataset;

            const features = data?.type === "FeatureCollection"
                ? data.features || []
                : data?.type === "Feature"
                    ? [data]
                    : [];

            const result = [];

            for (const feature of features) {
                const lineGeometries = extractLineGeometries(feature.geometry);

                for (const geometry of lineGeometries) {
                    const situation = feature?.properties?.["SITUAÇÃO"];
                    const city = feature?.properties?.["CIDADE"] || "Sem cidade";

                    if (!STATUS_COLORS[situation]) continue;

                    result.push({
                        type: "Feature",
                        properties: {
                            "SITUAÇÃO": situation,
                            "CIDADE": city
                        },
                        geometry
                    });
                }
            }

            return result;
        }

        function rebuildNormalizedFeatures() {
            normalizedFeatures = datasets.flatMap(normalizeDataset);
            rebuildCityFilters();
            updateMap(true);
        }

        function rebuildCityFilters() {
            const cities = [...new Set(
                normalizedFeatures
                    .map(feature => feature.properties["CIDADE"])
                    .filter(Boolean)
            )].sort((a, b) => a.localeCompare(b, "pt-BR"));

            cityFiltersEl.innerHTML = "";

            if (!cities.length) {
                cityFiltersEl.innerHTML =
                    '<span class="empty-note">Nenhuma cidade carregada.</span>';
                return;
            }

            for (const city of cities) {
                const label = document.createElement("label");
                label.className = "filter-label";

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.className = "city-filter";
                checkbox.value = city;
                checkbox.checked = true;

                checkbox.addEventListener("change", () => updateMap(false));

                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(city));
                cityFiltersEl.appendChild(label);
            }
        }

        function buildPopup(feature) {
            const props = feature.properties || {};

            return `
                <div class="situation-popup">
                    <div><strong>Cidade:</strong> ${escapeHtml(props["CIDADE"] || "")}</div>
                    <div><strong>Situação:</strong> ${escapeHtml(props["SITUAÇÃO"] || "")}</div>
                </div>
            `;
        }

        function updateMap(fitBounds) {
            camadaGeral.clearLayers();

            const selectedCities = new Set(
                Array.from(document.querySelectorAll(".city-filter:checked"))
                    .map(cb => cb.value)
            );

            const selectedStatuses = new Set(
                Array.from(document.querySelectorAll(".status-filter:checked"))
                    .map(cb => cb.value)
            );

            const visibleFeatures = normalizedFeatures.filter(feature => {
                const props = feature.properties || {};

                return (
                    selectedCities.has(props["CIDADE"]) &&
                    selectedStatuses.has(props["SITUAÇÃO"])
                );
            });

            const layer = L.geoJSON({
                type: "FeatureCollection",
                features: visibleFeatures
            }, {
                style: feature => ({
                    color: STATUS_COLORS[feature.properties["SITUAÇÃO"]],
                    weight: 4,
                    opacity: 0.85
                }),
                onEachFeature: (feature, leafletLayer) => {
                    leafletLayer.bindPopup(buildPopup(feature), {
                        maxWidth: 280
                    });
                }
            });

            camadaGeral.addLayer(layer);

            statusBar.textContent =
                `${visibleFeatures.length} linha(s) exibida(s) de ${normalizedFeatures.length}`;

            if (
                fitBounds &&
                visibleFeatures.length > 0 &&
                camadaGeral.getBounds().isValid()
            ) {
                map.fitBounds(camadaGeral.getBounds(), {
                    padding: [20, 20]
                });
            }
        }

        document.querySelectorAll(".status-filter").forEach(checkbox => {
            checkbox.addEventListener("change", () => updateMap(false));
        });

        if (Array.isArray(EMBEDDED_DATASETS) && EMBEDDED_DATASETS.length) {
            datasets = EMBEDDED_DATASETS;
            rebuildNormalizedFeatures();
        } else {
            rebuildCityFilters();
        }
    </script>
